name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.128.0"
          extended: true

      - name: Download images from stabatmater.info
        run: |
          mkdir -p static/images
          curl -sL -o static/images/logo.png \
            "https://stabatmater.info/wp-content/uploads/2021/02/cropped-cropped-stabat-mater-beeld.png"
          curl -sL -o static/images/hero-banner.jpg \
            "https://stabatmater.info/wp-content/uploads/2021/01/banner-8.jpg"
          curl -sL -o static/images/donate-banner.jpg \
            "https://stabatmater.info/wp-content/uploads/2025/02/banner-met-tekst-nw-300x175.jpg"
          echo "Downloaded: $(du -sh static/images/*)"

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
