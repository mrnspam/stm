name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.128.0"
          extended: true

      - name: Download images from stabatmater.info
        run: |
          mkdir -p static/images
          # Logo
          curl -sL -o static/images/logo.png \
            "https://stabatmater.info/wp-content/uploads/2021/02/cropped-cropped-stabat-mater-beeld.png"
          # Hero banners
          curl -sL -o static/images/banner-8.jpg \
            "https://stabatmater.info/wp-content/uploads/2021/01/banner-8.jpg"
          curl -sL -o static/images/banner9.jpg \
            "https://stabatmater.info/wp-content/uploads/2021/01/banner9.jpg"
          curl -sL -o static/images/banneri.jpg \
            "https://stabatmater.info/wp-content/uploads/2021/01/banneri.jpg"
          curl -sL -o static/images/banner-7.jpg \
            "https://stabatmater.info/wp-content/uploads/2021/01/banner-7.jpg"
          curl -sL -o static/images/banner5.jpg \
            "https://stabatmater.info/wp-content/uploads/2021/01/banner5.jpg"
          curl -sL -o static/images/stabatmater-header-475.jpg \
            "https://stabatmater.info/wp-content/uploads/2021/01/stabatmater-header-475.jpg"
          # Donate banner
          curl -sL -o static/images/donate-banner.jpg \
            "https://stabatmater.info/wp-content/uploads/2025/02/banner-met-tekst-nw-300x175.jpg"
          # About page photo
          curl -sL -o static/images/hans.jpg \
            "https://stabatmater.info/wp-content/uploads/2015/02/Hans.jpg"
          # Colour bars
          curl -sL -o static/images/colorbar-aichinger.gif \
            "https://stabatmater.info/wp-content/uploads/colorbar/aichinger-580x103.gif"
          curl -sL -o static/images/colorbar-abos.gif \
            "https://stabatmater.info/wp-content/uploads/2014/09/abos-580x147.gif"
          curl -sL -o static/images/colorbar-pergolesi1.gif \
            "https://stabatmater.info/wp-content/uploads/colorbar/pergolesi1.gif"
          curl -sL -o static/images/colorbar-pergolesi2.gif \
            "https://stabatmater.info/wp-content/uploads/colorbar/pergolesi2.gif"
          curl -sL -o static/images/vivaldi.gif \
            "https://stabatmater.info/wp-content/uploads/colorbar/vivaldi.gif"
          curl -sL -o static/images/haydn.gif \
            "https://stabatmater.info/wp-content/uploads/colorbar/haydn.gif"
          curl -sL -o static/images/rossini.gif \
            "https://stabatmater.info/wp-content/uploads/colorbar/rossini.gif"
          curl -sL -o static/images/gregorian.gif \
            "https://stabatmater.info/wp-content/uploads/colorbar/gregorian.gif"
          curl -sL -o static/images/schubert1.gif \
            "https://stabatmater.info/wp-content/uploads/colorbar/schubert1.gif"
          curl -sL -o static/images/schubert2.gif \
            "https://stabatmater.info/wp-content/uploads/colorbar/schubert2.gif"
          curl -sL -o static/images/dvorak.gif \
            "https://stabatmater.info/wp-content/uploads/colorbar/dvorak.gif"
          curl -sL -o static/images/palestrina.gif \
            "https://stabatmater.info/wp-content/uploads/colorbar/palestrina.gif"
          curl -sL -o static/images/poulenc.gif \
            "https://stabatmater.info/wp-content/uploads/colorbar/poulenc.gif"
          curl -sL -o static/images/boccherini1.gif \
            "https://stabatmater.info/wp-content/uploads/colorbar/boccherini1.gif"
          curl -sL -o static/images/boccherini2.gif \
            "https://stabatmater.info/wp-content/uploads/colorbar/boccherini2.gif"
          curl -sL -o static/images/scarlata.gif \
            "https://stabatmater.info/wp-content/uploads/colorbar/scarlata.gif"
          curl -sL -o static/images/penderecki.gif \
            "https://stabatmater.info/wp-content/uploads/colorbar/penderecki.gif"
          curl -sL -o static/images/traetta.gif \
            "https://stabatmater.info/wp-content/uploads/colorbar/traetta.gif"
          curl -sL -o static/images/traetta2.gif \
            "https://stabatmater.info/wp-content/uploads/colorbar/traetta2.gif"
          # Composer portraits (400px thumbnails from Wikimedia Commons)
          curl -sL -o static/images/pergolesi-portrait.jpg \
            "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Giovanni_Battista_Pergolesi.jpg/400px-Giovanni_Battista_Pergolesi.jpg"
          curl -sL -o static/images/vivaldi-portrait.jpg \
            "https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Vivaldi.jpg/400px-Vivaldi.jpg"
          curl -sL -o static/images/haydn-portrait.jpg \
            "https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Joseph_Haydn.jpg/400px-Joseph_Haydn.jpg"
          curl -sL -o static/images/rossini-portrait.jpg \
            "https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Rossini_young-circa-1815.jpg/400px-Rossini_young-circa-1815.jpg"
          curl -sL -o static/images/verdi-portrait.jpg \
            "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Giuseppe_Verdi_by_Ferdinand_Mulnier_BW.jpg/400px-Giuseppe_Verdi_by_Ferdinand_Mulnier_BW.jpg"
          curl -sL -o static/images/schubert-portrait.jpg \
            "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Franz_Schubert_by_Wilhelm_August_Rieder_1875.jpg/400px-Franz_Schubert_by_Wilhelm_August_Rieder_1875.jpg"
          curl -sL -o static/images/dvorak-portrait.jpg \
            "https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/Dvorak.jpg/400px-Dvorak.jpg"
          curl -sL -o static/images/palestrina-portrait.jpg \
            "https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/Giovanni_Pierluigi_da_Palestrina.jpg/400px-Giovanni_Pierluigi_da_Palestrina.jpg"
          curl -sL -o static/images/poulenc-portrait.jpg \
            "https://upload.wikimedia.org/wikipedia/en/thumb/b/b8/Poulenc-1922.jpg/400px-Poulenc-1922.jpg"
          curl -sL -o static/images/boccherini-portrait.jpg \
            "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Portrait_de_Luigi_Boccherini%2C_1814_%28cropped%29.jpg/400px-Portrait_de_Luigi_Boccherini%2C_1814_%28cropped%29.jpg"
          curl -sL -o static/images/scarlatti-portrait.jpg \
            "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Alessandro_Scarlatti.jpg/400px-Alessandro_Scarlatti.jpg"
          curl -sL -o static/images/penderecki-portrait.jpg \
            "https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Krzysztof_Penderecki_20080706.jpg/400px-Krzysztof_Penderecki_20080706.jpg"
          curl -sL -o static/images/traetta-portrait.jpg \
            "https://upload.wikimedia.org/wikipedia/commons/thumb/2/20/Tommaso_traetta.jpg/400px-Tommaso_traetta.jpg"
          # Pre-footer widget images
          curl -sL -o static/images/youtube.jpg \
            "https://stabatmater.info/wp-content/uploads/2022/03/youtube.jpg"
          curl -sL -o static/images/icoon-insta.jpg \
            "https://stabatmater.info/wp-content/uploads/2022/02/icoon-insta.jpg"
          curl -sL -o static/images/book-cover.jpg \
            "https://stabatmater.info/wp-content/uploads/2024/03/voorkant-en-nw-357.jpg"
          echo "Downloaded images:"
          ls -lh static/images/

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
