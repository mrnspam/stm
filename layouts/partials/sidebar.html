<aside class="sidebar">

  <div class="sidebar-donate">
    <a href="https://stabatmater.info/stabat-mater-collection-support/" target="_blank">
      <img src="{{ "images/donate-banner.jpg" | absURL }}" alt="Support our mission, please donate" style="width:100%; border-radius:4px; display:block;">
    </a>
  </div>

  <div class="sidebar-widget">
    <h3>Search</h3>
    <form action="/search/" method="get" class="search-box">
      <input type="text" name="q" placeholder="Search this website">
      <button type="submit">→</button>
    </form>
  </div>

  <div class="sidebar-widget">
    <h3>Recent posts</h3>
    <ul style="list-style:none; padding:0;">
      {{ range first 5 (where .Site.RegularPages "Section" "blog") }}
      <li style="margin-bottom:0.5rem; font-size:0.85rem;">
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <div style="font-size:0.75rem; color:#999;">{{ .Date.Format "02-01-2006" }}</div>
      </li>
      {{ end }}
    </ul>
  </div>

  <div class="sidebar-widget">
    <h3>Composers</h3>
    <ul style="list-style:none; padding:0; font-size:0.85rem;">
      <li><a href="/composers/">Alphabetically</a></li>
      <li><a href="/composers/by-country/">By country of origin</a></li>
      <li><a href="/composers/chronologically/">Chronologically</a></li>
    </ul>
  </div>

</aside>
