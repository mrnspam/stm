{{ define "main" }}
{{ $composers := where .Pages "Params.is_index" "!=" true }}
<h1>Composers</h1>
<p>Search the collection of {{ len $composers }} Stabat Mater composers.</p>

<div class="filter-bar" id="filter-bar">
  <button class="filter-btn active" data-filter="all">All</button>
  {{ range seq 65 90 }}
  <button class="filter-btn" data-filter="{{ printf "%c" . }}">{{ printf "%c" . }}</button>
  {{ end }}
</div>

<div class="composer-grid" id="composer-list">
  {{ range $composers }}
  <div class="composer-item" data-letter="{{ upper (substr .Title 0 1) }}">
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
  </div>
  {{ end }}
</div>

<script>
(function() {
  var btns = document.querySelectorAll('.filter-btn');
  var items = document.querySelectorAll('.composer-item');
  btns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      btns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      var f = btn.dataset.filter;
      items.forEach(function(item) {
        if (f === 'all' || item.dataset.letter === f) {
          item.classList.remove('hidden');
        } else {
          item.classList.add('hidden');
        }
      });
    });
  });
})();
</script>
{{ end }}
