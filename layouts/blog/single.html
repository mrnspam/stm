{{ define "main" }}
<article>
  <h1>{{ .Title }}</h1>
  <p style="color:#999; font-size:0.85rem; font-family:sans-serif; margin-bottom:1.5rem;">
    {{ .Date.Format "2 January 2006" }}
  </p>
  {{ .Content }}
  <p style="margin-top:2rem; font-size:0.85rem;">
    ← <a href="/blog/">Terug naar het blog</a>
  </p>
</article>
{{ end }}
